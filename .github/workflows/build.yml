name: FFmpeg安卓全功能自动编译
on:
  push:
    branches: [ main ]
  workflow_dispatch: # 支持手动触发编译
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 替换系统源为清华镜像，安装基础依赖
        run: |
          sudo sed -i "s@http://.*archive.ubuntu.com@https://mirrors.tuna.tsinghua.edu.cn@g" /etc/apt/sources.list
          sudo sed -i "s@http://.*security.ubuntu.com@https://mirrors.tuna.tsinghua.edu.cn@g" /etc/apt/sources.list
          sudo apt update -y
          sudo apt install -y wget curl git make cmake ninja-build pkg-config python3 python3-pip unzip autoconf automake libtool
          # pip换清华源
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
      
      - name: 3. 下载Android NDK（Google官方地址，云端高速下载）
        run: |
          # 先定义当前shell可用的变量，同时写入全局环境变量
          CURRENT_DIR=$(pwd)
          NDK_PATH="${CURRENT_DIR}/android-ndk-r25c"
          ANDROID_API=24
          TARGET_ARCH=aarch64-linux-android
          OUTPUT_DIR="${CURRENT_DIR}/output"
          BUILD_DIR="${CURRENT_DIR}/build"
          
          # 下载并解压NDK，增加超时和重试
          wget -t 5 --timeout=30 -O android-ndk-r25c-linux.zip https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          
          # 写入全局环境变量，给后续步骤使用
          echo "CURRENT_DIR=${CURRENT_DIR}" >> $GITHUB_ENV
          echo "NDK_PATH=${NDK_PATH}" >> $GITHUB_ENV
          echo "ANDROID_API=${ANDROID_API}" >> $GITHUB_ENV
          echo "TARGET_ARCH=${TARGET_ARCH}" >> $GITHUB_ENV
          echo "OUTPUT_DIR=${OUTPUT_DIR}" >> $GITHUB_ENV
          echo "BUILD_DIR=${BUILD_DIR}" >> $GITHUB_ENV
          
          # 提前创建所需目录，避免后续报错
          mkdir -p ${OUTPUT_DIR}
          mkdir -p ${BUILD_DIR}/lib/pkgconfig
          echo "PKG_CONFIG_PATH=${BUILD_DIR}/lib/pkgconfig" >> $GITHUB_ENV

      - name: 4. 配置交叉编译工具链全局变量
        run: |
          TOOLCHAIN="${NDK_PATH}/toolchains/llvm/prebuilt/linux-x86_64"
          echo "TOOLCHAIN=${TOOLCHAIN}" >> $GITHUB_ENV
          echo "CC=${TOOLCHAIN}/bin/${TARGET_ARCH}${ANDROID_API}-clang" >> $GITHUB_ENV
          echo "CXX=${TOOLCHAIN}/bin/${TARGET_ARCH}${ANDROID_API}-clang++" >> $GITHUB_ENV
          echo "AR=${TOOLCHAIN}/bin/llvm-ar" >> $GITHUB_ENV
          echo "LD=${TOOLCHAIN}/bin/ld" >> $GITHUB_ENV
          echo "RANLIB=${TOOLCHAIN}/bin/llvm-ranlib" >> $GITHUB_ENV
          echo "STRIP=${TOOLCHAIN}/bin/llvm-strip" >> $GITHUB_ENV

      - name: 5. 编译x264（H.264编码，清华镜像）
        run: |
          git clone --depth 1 --retry 5 --timeout=30 https://mirrors.tuna.tsinghua.edu.cn/git/videolan/x264.git
          cd x264
          ./configure \
            --host=${TARGET_ARCH} \
            --cross-prefix=${TOOLCHAIN}/bin/llvm- \
            --sysroot=${TOOLCHAIN}/sysroot \
            --prefix=${BUILD_DIR} \
            --enable-static \
            --enable-pic \
            --disable-cli \
            --disable-opencl \
            --disable-interlaced \
            --bit-depth=8 \
            --chroma-format=420
          make -j4
          make install
          cd ..

      - name: 6. 编译x265（H.265编码，Gitee国内镜像）
        run: |
          git clone --depth 1 --retry 5 --timeout=30 https://gitee.com/mirrors_multicoreware/x265_git.git
          cd x265_git/build/linux
          cmake -G "Unix Makefiles" ../../source \
            -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_ANDROID_API=${ANDROID_API} \
            -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a \
            -DCMAKE_ANDROID_NDK=${NDK_PATH} \
            -DCMAKE_INSTALL_PREFIX=${BUILD_DIR} \
            -DENABLE_SHARED=OFF \
            -DENABLE_CLI=OFF \
            -DENABLE_PIC=ON \
            -DHIGH_BIT_DEPTH=OFF \
            -DMAIN12=OFF \
            -DMAIN10=ON
          make -j4
          make install
          cd ../../..

      - name: 7. 编译fdk-aac（高清音频编码，Gitee国内镜像）
        run: |
          git clone --depth 1 --retry 5 --timeout=30 https://gitee.com/mirrors/fdk-aac.git
          cd fdk-aac
          ./autogen.sh
          ./configure \
            --host=${TARGET_ARCH} \
            --prefix=${BUILD_DIR} \
            --enable-static \
            --disable-shared \
            --with-pic=yes
          make -j4
          make install
          cd ..

      - name: 8. 编译openssl（网络/加密支持，清华镜像）
        run: |
          wget -t 5 --timeout=30 -O openssl.tar.gz https://mirrors.tuna.tsinghua.edu.cn/openssl/source/openssl-3.3.2.tar.gz
          tar -zxf openssl.tar.gz
          cd openssl-3.3.2
          ./Configure android-arm64 \
            -D__ANDROID_API__=${ANDROID_API} \
            --prefix=${BUILD_DIR} \
            --libdir=lib \
            no-shared \
            no-tests
          make -j4
          make install_sw
          cd ..

      - name: 9. 编译FFmpeg主程序（清华镜像，全功能集成）
        run: |
          git clone --depth 1 --retry 5 --timeout=30 https://mirrors.tuna.tsinghua.edu.cn/git/ffmpeg/ffmpeg.git
          cd ffmpeg
          ./configure \
            --prefix=${OUTPUT_DIR} \
            --target-os=android \
            --arch=aarch64 \
            --cpu=armv8-a \
            --enable-cross-compile \
            --cross-prefix=${TOOLCHAIN}/bin/llvm- \
            --sysroot=${TOOLCHAIN}/sysroot \
            --cc=${CC} \
            --cxx=${CXX} \
            --ar=${AR} \
            --ranlib=${RANLIB} \
            --strip=${STRIP} \
            --enable-gpl \
            --enable-nonfree \
            --enable-version3 \
            --enable-static \
            --disable-shared \
            --enable-small \
            --enable-pic \
            --enable-libx264 \
            --enable-libx265 \
            --enable-libfdk-aac \
            --enable-openssl \
            --enable-neon \
            --enable-hwaccels \
            --enable-mediacodec \
            --enable-jni \
            --disable-doc \
            --disable-programs \
            --enable-ffmpeg \
            --extra-cflags="-I${BUILD_DIR}/include -fPIE -fPIC -O2" \
            --extra-ldflags="-L${BUILD_DIR}/lib -fPIE -pie" \
            --extra-libs="-lm -ldl -llog"
          make -j4
          make install
          cd ..

      - name: 10. 打包精简成品
        run: |
          cd ${OUTPUT_DIR}
          ${STRIP} bin/ffmpeg
          zip -r ffmpeg-arm64-android.zip bin/
          echo "编译完成！成品文件：ffmpeg-arm64-android.zip"

      - name: 11. 上传编译成品（可直接下载）
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-arm64-android-成品
          path: ${OUTPUT_DIR}/ffmpeg-arm64-android.zip
