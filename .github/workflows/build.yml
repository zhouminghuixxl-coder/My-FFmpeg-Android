name: Build Full FFmpeg Android Binary

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取最强 Android 编译脚本
        uses: actions/checkout@v4
        with:
          repository: Javernaut/ffmpeg-android-maker
          ref: master

      - name: 2. 配置 NDK (Android 底层开发工具包)
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b

      - name: 3. 火力全开：编译依赖库并生成 ffmpeg
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          # 【修复1】补充 SDK 环境变量，这是脚本运行必须的
          ANDROID_SDK_HOME: ${{ env.ANDROID_HOME }}
          EXTRA_BUILD_CONFIGURATION_FLAGS: "--enable-ffmpeg --enable-gpl --enable-nonfree --enable-static --disable-shared"
        run: |
          chmod +x ffmpeg-android-maker.sh
          
          # 【修复2和3】修改了架构参数为 -abis，去掉了原版脚本不支持的 fdk-aac
          ./ffmpeg-android-maker.sh -android=24 -abis=arm64-v8a -x264 -x265 -vpx -opus -mp3lame

      - name: 4. 提取生成的二进制文件
        run: |
          mkdir -p release_bin
          find build -name "ffmpeg" -type f -executable -exec cp {} release_bin/ \;

      - name: 5. 上传产物供你下载
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-android-arm64
          path: release_bin/
