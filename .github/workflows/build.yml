name: Build FFmpeg for Android (arm64)

on:
  workflow_dispatch:        # 手动触发
  push:
    branches: [ main ]      # 也可以设置自动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          echo "NDK_PATH=$PWD/android-ndk-r25c" >> $GITHUB_ENV

      - name: Download FFmpeg source
        run: |
          git clone https://git.ffmpeg.org/ffmpeg.git ffmpeg_src
          cd ffmpeg_src
          git checkout n7.0          # 选择稳定版本，也可用 master

      - name: Configure and build FFmpeg
        run: |
          export PATH=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
          cd ffmpeg_src

          # 设置编译工具链
          export AR=llvm-ar
          export CC=aarch64-linux-android21-clang
          export AS=$CC
          export CXX=aarch64-linux-android21-clang++
          export LD=ld
          export RANLIB=llvm-ranlib
          export STRIP=llvm-strip

          # 配置编译选项（全功能静态版本）
          ./configure \
            --target-os=android \
            --arch=arm64 \
            --cross-prefix=aarch64-linux-android- \
            --cc=$CC \
            --cxx=$CXX \
            --ar=$AR \
            --ranlib=$RANLIB \
            --strip=$STRIP \
            --enable-cross-compile \
            --sysroot=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/sysroot \
            --disable-asm \
            --disable-doc \
            --disable-debug \
            --disable-programs \
            --enable-ffmpeg \
            --enable-static \
            --disable-shared \
            --enable-gpl \
            --enable-nonfree \
            --enable-libx264 \
            --enable-libx265 \
            --enable-libmp3lame \
            --enable-libvorbis \
            --enable-libopus \
            --enable-libvpx \
            --enable-libaom \
            --enable-libdav1d \
            --enable-jni \
            --enable-mediacodec \
            --enable-pthreads \
            --enable-version3 \
            --extra-cflags="-fPIC -DANDROID" \
            --extra-ldflags="-Wl,-z,stack-size=2097152"

          # 编译（使用所有 CPU 核心）
          make -j$(nproc)
          make install

      - name: Upload FFmpeg binary
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-android-arm64
          path: ffmpeg_src/ffmpeg
