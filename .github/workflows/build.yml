name: FFmpeg安卓稳定编译
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装系统依赖
        run: |
          sudo apt update -y
          sudo apt install -y wget curl git make cmake pkg-config autoconf automake libtool unzip bzip2

      - name: 准备NDK和全局环境
        run: |
          # 固定路径，无变量空值风险
          WORK_DIR=$(pwd)
          NDK_DIR="${WORK_DIR}/ndk-r25c"
          BUILD_DIR="${WORK_DIR}/build_libs"
          OUTPUT_DIR="${WORK_DIR}/ffmpeg_output"
          
          # 下载NDK，官方固定地址，云端秒下
          wget -t 10 --timeout=60 -O ndk.zip https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q ndk.zip -d ${NDK_DIR}
          
          # 写入全局变量，后续步骤直接用
          echo "WORK_DIR=${WORK_DIR}" >> $GITHUB_ENV
          echo "NDK=${NDK_DIR}/android-ndk-r25c" >> $GITHUB_ENV
          echo "BUILD_DIR=${BUILD_DIR}" >> $GITHUB_ENV
          echo "OUTPUT_DIR=${OUTPUT_DIR}" >> $GITHUB_ENV
          echo "API=24" >> $GITHUB_ENV
          echo "ARCH=aarch64-linux-android" >> $GITHUB_ENV
          
          # 创建所有需要的目录
          mkdir -p ${BUILD_DIR}/lib/pkgconfig
          mkdir -p ${BUILD_DIR}/include
          mkdir -p ${OUTPUT_DIR}

      - name: 配置交叉编译工具链
        run: |
          TOOLCHAIN="${NDK}/toolchains/llvm/prebuilt/linux-x86_64"
          echo "TOOLCHAIN=${TOOLCHAIN}" >> $GITHUB_ENV
          echo "CC=${TOOLCHAIN}/bin/${ARCH}${API}-clang" >> $GITHUB_ENV
          echo "CXX=${TOOLCHAIN}/bin/${ARCH}${API}-clang++" >> $GITHUB_ENV
          echo "AR=${TOOLCHAIN}/bin/llvm-ar" >> $GITHUB_ENV
          echo "RANLIB=${TOOLCHAIN}/bin/llvm-ranlib" >> $GITHUB_ENV
          echo "STRIP=${TOOLCHAIN}/bin/llvm-strip" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=${BUILD_DIR}/lib/pkgconfig" >> $GITHUB_ENV

      - name: 编译x264（H.264编码，GitHub官方镜像）
        run: |
          wget -t 10 --timeout=60 -O x264.tar.gz https://github.com/mirror/x264/archive/refs/heads/master.tar.gz
          tar -zxf x264.tar.gz
          cd x264-master
          ./configure \
            --host=${ARCH} \
            --cross-prefix=${TOOLCHAIN}/bin/llvm- \
            --sysroot=${TOOLCHAIN}/sysroot \
            --prefix=${BUILD_DIR} \
            --enable-static \
            --enable-pic \
            --disable-cli \
            --disable-opencl \
            --bit-depth=8
          make -j4
          make install
          cd ${WORK_DIR}

      - name: 编译x265（H.265编码，GitHub官方仓库）
        run: |
          wget -t 10 --timeout=60 -O x265.tar.gz https://github.com/videolan/x265/archive/refs/heads/master.tar.gz
          tar -zxf x265.tar.gz
          cd x265-master/build/linux
          cmake -G "Unix Makefiles" ../../source \
            -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_ANDROID_API=${API} \
            -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a \
            -DCMAKE_ANDROID_NDK=${NDK} \
            -DCMAKE_INSTALL_PREFIX=${BUILD_DIR} \
            -DENABLE_SHARED=OFF \
            -DENABLE_CLI=OFF \
            -DENABLE_PIC=ON
          make -j4
          make install
          cd ${WORK_DIR}

      - name: 编译fdk-aac（音频编码，官方稳定版）
        run: |
          wget -t 10 --timeout=60 -O fdk-aac.tar.gz https://github.com/mstorsjo/fdk-aac/archive/refs/tags/v2.0.3.tar.gz
          tar -zxf fdk-aac.tar.gz
          cd fdk-aac-2.0.3
          ./autogen.sh
          ./configure \
            --host=${ARCH} \
            --prefix=${BUILD_DIR} \
            --enable-static \
            --disable-shared \
            --with-pic=yes
          make -j4
          make install
          cd ${WORK_DIR}

      - name: 编译openssl（加密支持，清华固定版本）
        run: |
          wget -t 10 --timeout=60 -O openssl.tar.gz https://mirrors.tuna.tsinghua.edu.cn/openssl/source/openssl-3.3.2.tar.gz
          tar -zxf openssl.tar.gz
          cd openssl-3.3.2
          ./Configure android-arm64 \
            -D__ANDROID_API__=${API} \
            --prefix=${BUILD_DIR} \
            --libdir=lib \
            no-shared no-tests
          make -j4
          make install_sw
          cd ${WORK_DIR}

      - name: 编译FFmpeg主程序（官方仓库，全功能集成）
        run: |
          wget -t 10 --timeout=60 -O ffmpeg.tar.gz https://github.com/FFmpeg/FFmpeg/archive/refs/heads/master.tar.gz
          tar -zxf ffmpeg.tar.gz
          cd FFmpeg-master
          ./configure \
            --prefix=${OUTPUT_DIR} \
            --target-os=android \
            --arch=aarch64 \
            --cpu=armv8-a \
            --enable-cross-compile \
            --cross-prefix=${TOOLCHAIN}/bin/llvm- \
            --sysroot=${TOOLCHAIN}/sysroot \
            --cc=${CC} \
            --cxx=${CXX} \
            --ar=${AR} \
            --ranlib=${RANLIB} \
            --strip=${STRIP} \
            --enable-gpl \
            --enable-nonfree \
            --enable-static \
            --disable-shared \
            --enable-small \
            --enable-pic \
            --enable-libx264 \
            --enable-libx265 \
            --enable-libfdk-aac \
            --enable-openssl \
            --enable-neon \
            --enable-mediacodec \
            --enable-jni \
            --disable-doc \
            --disable-programs \
            --enable-ffmpeg \
            --extra-cflags="-I${BUILD_DIR}/include -fPIE -fPIC -O2" \
            --extra-ldflags="-L${BUILD_DIR}/lib -fPIE -pie" \
            --extra-libs="-lm -ldl -llog"
          make -j4
          make install
          cd ${WORK_DIR}

      - name: 打包成品
        run: |
          cd ${OUTPUT_DIR}
          ${STRIP} bin/ffmpeg
          zip -r ffmpeg-android-arm64.zip bin/
          echo "编译完成，成品已打包"

      - name: 上传成品，直接下载
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-android-arm64-成品
          path: ${{ env.OUTPUT_DIR }}/ffmpeg-android-arm64.zip
